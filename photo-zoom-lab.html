<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>照片放大實驗｜火星第一眼</title>
<style>
:root{
  --bg:#070b14; --panel:#0d1424; --line:#1e3a5c; --line2:#2a4a72;
  --amber:#ffb347; --cyan:#5ec8f2; --green:#39d353; --red:#ff5c47;
  --px:#f2e3c8; --text:#c9d6e8; --dim:#5a748f;
}
*{margin:0; padding:0; box-sizing:border-box;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Courier New','Noto Sans TC',monospace; letter-spacing:.02em;
  display:flex; flex-direction:column; overflow:hidden;
  background-image:
    radial-gradient(1px 1px at 12% 22%, #ffffff55 50%, transparent 51%),
    radial-gradient(1px 1px at 48% 8%,  #ffffff44 50%, transparent 51%),
    radial-gradient(1px 1px at 76% 30%, #ffffff55 50%, transparent 51%),
    radial-gradient(1px 1px at 30% 84%, #ffffff44 50%, transparent 51%);
}
header{text-align:center; padding:12px 16px 6px; flex:0 0 auto;}
h1{font-size:1.35rem; color:var(--px); letter-spacing:.18em;}
h1 small{display:block; font-size:.62rem; color:var(--dim); letter-spacing:.3em; margin-top:4px;}
.sub{font-size:.8rem; color:var(--cyan); margin-top:6px; letter-spacing:.06em;}

main{flex:1 1 auto; display:flex; gap:12px; padding:10px 14px; min-height:0;}
@media (max-width:820px){ main{flex-direction:column; overflow:auto;} }

.viewer{
  flex:1 1 auto; min-width:0; min-height:280px; position:relative;
  border:2px solid var(--line); background:#04070d; display:flex;
}
canvas#view{width:100%; height:100%; display:block; touch-action:none; cursor:grab;}
canvas#view.dragging{cursor:grabbing;}
.zoombadge{
  position:absolute; top:10px; left:10px; font-size:.85rem; color:var(--amber);
  background:#070b14dd; border:1px solid var(--line2); padding:5px 12px; letter-spacing:.08em;
  pointer-events:none;
}
.statusmsg{
  position:absolute; left:50%; bottom:10px; transform:translateX(-50%);
  max-width:92%; text-align:center; font-size:.82rem; line-height:1.6;
  background:#070b14dd; border:1px solid var(--line2); padding:6px 14px;
  color:var(--text); pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.statusmsg b{color:var(--amber);}

.side{
  flex:0 0 285px; display:flex; flex-direction:column; gap:10px; min-height:0; overflow:auto;
}
@media (max-width:820px){ .side{flex:0 0 auto;} }
.box{border:1px solid var(--line); background:var(--panel); padding:12px 14px;}
.box h2{font-size:.72rem; color:var(--dim); letter-spacing:.24em; margin-bottom:8px;}

.ctrlrow{display:flex; gap:8px; margin-bottom:8px;}
button{
  font-family:inherit; font-size:1rem; color:var(--amber); background:#241a10;
  border:1px solid var(--amber); padding:8px 0; flex:1; cursor:pointer; letter-spacing:.06em;
}
button:hover{background:var(--amber); color:#08131f;}
button.minor{color:var(--cyan); border-color:var(--line2); background:#101a2c; font-size:.8rem;}
button.minor:hover{background:var(--cyan); color:#08131f;}
input[type=range]{width:100%; accent-color:var(--amber); margin:4px 0 2px;}
.rangelabels{display:flex; justify-content:space-between; font-size:.62rem; color:var(--dim);}


.question{border-color:var(--amber); background:#181203;}
.question p{font-size:.82rem; line-height:1.8;}
.question b{color:var(--amber);}

.upload label{
  display:block; text-align:center; font-size:.8rem; color:var(--cyan);
  border:1px dashed var(--line2); background:#101a2c; padding:9px 6px; cursor:pointer;
}
.upload label:hover{background:var(--cyan); color:#08131f;}
input[type=file]{display:none;}
.upload .note{font-size:.66rem; color:var(--dim); margin-top:6px; line-height:1.6;}

footer{flex:0 0 auto; text-align:center; font-size:.6rem; color:var(--dim); letter-spacing:.24em; padding:6px 0 8px;}
footer a{color:var(--dim);}
</style>
</head>
<body>

<header>
  <h1>照片放大實驗<small>MISSION 01 · PHOTO ZOOM LAB</small></h1>
  <div class="sub">把照片一直放大……你會看到什麼？（拖曳移動、滾輪或雙指縮放）</div>
</header>

<main>
  <div class="viewer">
    <canvas id="view"></canvas>
    <div class="zoombadge" id="zoomBadge">×1.0</div>
    <div class="statusmsg" id="statusMsg">這是一張風景照片，看起來很平滑吧？試著放大它！</div>
  </div>

  <div class="side">
    <div class="box">
      <h2>▸ 縮放控制</h2>
      <div class="ctrlrow">
        <button id="btnOut">− 縮小</button>
        <button id="btnIn">＋ 放大</button>
      </div>
      <input type="range" id="zoomSlider" min="0" max="100" value="0">
      <div class="rangelabels"><span>整張照片</span><span>最大放大</span></div>
      <div class="ctrlrow" style="margin-top:8px; margin-bottom:0;">
        <button class="minor" id="btnReset">⟲ 回復原狀</button>
        <button class="minor" id="btnGrid">格線：開</button>
      </div>
    </div>

    <div class="box question">
      <p><b>🔎 想一想：</b>你放大後看到的格子，有哪一格是相機覺得「不重要」就沒記的嗎？</p>
    </div>

    <div class="box upload">
      <h2>▸ 換一張照片實驗</h2>
      <label for="fileInput">📁 選擇自己的照片（或用平板拍一張）</label>
      <input type="file" id="fileInput" accept="image/*">
      <div class="ctrlrow" style="margin-top:8px; margin-bottom:0;">
        <button class="minor" id="btnMars">🏞 回到範例照片</button>
      </div>
      <div class="note">照片只會留在這個畫面裡做實驗，不會被傳送或儲存。</div>
    </div>
  </div>
</main>

<footer>火星第一眼：1976 維京一號的拍照任務 · <a href="mission-control.html">⌂ 回任務控制中心</a></footer>

<img id="marsSrc" src="lab_example.jpg" alt="" style="display:none">

<script>
(function(){
  const canvas = document.getElementById('view');
  const ctx = canvas.getContext('2d');
  const badge = document.getElementById('zoomBadge');
  const statusMsg = document.getElementById('statusMsg');
  const slider = document.getElementById('zoomSlider');

  // 影像來源（離屏 canvas，供取像素值）
  const off = document.createElement('canvas');
  const offCtx = off.getContext('2d');
  let imgW = 0, imgH = 0;

  // 檢視狀態
  let scale = 1, minScale = 1;
  const MAX_SCALE = 80;
  let ox = 0, oy = 0;           // 影像原點在畫布上的位移（CSS px）
  let showGrid = true;
  let dpr = 1;

  function fitCanvas(){
    dpr = window.devicePixelRatio || 1;
    const r = canvas.getBoundingClientRect();
    canvas.width  = Math.max(1, Math.round(r.width * dpr));
    canvas.height = Math.max(1, Math.round(r.height * dpr));
  }

  function loadImage(img, msg){
    imgW = img.naturalWidth; imgH = img.naturalHeight;
    off.width = imgW; off.height = imgH;
    offCtx.drawImage(img, 0, 0);
    resetView();
    if (msg) setStatus(msg);
  }

  function resetView(){
    fitCanvas();
    const vw = canvas.width / dpr, vh = canvas.height / dpr;
    minScale = Math.min(vw / imgW, vh / imgH);
    scale = minScale;
    ox = (vw - imgW * scale) / 2;
    oy = (vh - imgH * scale) / 2;
    draw();
  }

  function clampPan(){
    const vw = canvas.width / dpr, vh = canvas.height / dpr;
    const w = imgW * scale, h = imgH * scale;
    if (w <= vw) ox = (vw - w) / 2;
    else ox = Math.min(0, Math.max(vw - w, ox));
    if (h <= vh) oy = (vh - h) / 2;
    else oy = Math.min(0, Math.max(vh - h, oy));
  }

  function draw(){
    const vw = canvas.width / dpr, vh = canvas.height / dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, vw, vh);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, ox, oy, imgW * scale, imgH * scale);

    // 像素格線（放大到一定程度才出現）
    if (showGrid && scale >= 10){
      ctx.strokeStyle = 'rgba(94,200,242,.35)';
      ctx.lineWidth = 1;
      const x0 = Math.max(0, Math.floor((0 - ox) / scale));
      const x1 = Math.min(imgW, Math.ceil((vw - ox) / scale));
      const y0 = Math.max(0, Math.floor((0 - oy) / scale));
      const y1 = Math.min(imgH, Math.ceil((vh - oy) / scale));
      ctx.beginPath();
      for (let x = x0; x <= x1; x++){ const sx = ox + x * scale; ctx.moveTo(sx, Math.max(0, oy)); ctx.lineTo(sx, Math.min(vh, oy + imgH * scale)); }
      for (let y = y0; y <= y1; y++){ const sy = oy + y * scale; ctx.moveTo(Math.max(0, ox), sy); ctx.lineTo(Math.min(vw, ox + imgW * scale), sy); }
      ctx.stroke();
    }

    updateBadge();
  }

  function updateBadge(){
    const rel = scale / minScale;
    badge.textContent = '×' + (rel >= 10 ? Math.round(rel) : rel.toFixed(1));
    // slider 同步（對數刻度）
    const t = Math.log(scale / minScale) / Math.log(MAX_SCALE / minScale);
    slider.value = Math.round(Math.min(1, Math.max(0, t)) * 100);
    // 狀態訊息
    if (scale < 4) setStatus('看起來很平滑對吧？繼續<b>放大</b>看看……');
    else if (scale < 10) setStatus('快了！再放大一點……');
    else setStatus('看到<b>一格一格的色塊</b>了嗎？每一格就是一個<b>像素</b>！');
  }

  function setStatus(html){
    statusMsg.innerHTML = html;
  }

  function zoomAt(cx, cy, factor){
    const ns = Math.min(MAX_SCALE, Math.max(minScale, scale * factor));
    if (ns === scale) return;
    ox = cx - (cx - ox) * (ns / scale);
    oy = cy - (cy - oy) * (ns / scale);
    scale = ns;
    clampPan();
    draw();
  }

  // ── 控制列 ──
  document.getElementById('btnIn').addEventListener('click', ()=>{
    zoomAt(canvas.width/dpr/2, canvas.height/dpr/2, 1.6);
  });
  document.getElementById('btnOut').addEventListener('click', ()=>{
    zoomAt(canvas.width/dpr/2, canvas.height/dpr/2, 1/1.6);
  });
  document.getElementById('btnReset').addEventListener('click', resetView);
  const btnGrid = document.getElementById('btnGrid');
  btnGrid.addEventListener('click', ()=>{
    showGrid = !showGrid;
    btnGrid.textContent = '格線：' + (showGrid ? '開' : '關');
    draw();
  });
  slider.addEventListener('input', ()=>{
    const t = slider.value / 100;
    const target = minScale * Math.pow(MAX_SCALE / minScale, t);
    zoomAt(canvas.width/dpr/2, canvas.height/dpr/2, target / scale);
  });

  // ── 滑鼠：滾輪縮放、拖曳平移、點擊取像素 ──
  canvas.addEventListener('wheel', e=>{
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY < 0 ? 1.18 : 1/1.18);
  }, {passive:false});

  let dragging = false, moved = false, lx = 0, ly = 0;
  canvas.addEventListener('pointerdown', e=>{
    if (e.pointerType === 'touch') return; // 觸控另外處理
    dragging = true; moved = false; lx = e.clientX; ly = e.clientY;
    canvas.classList.add('dragging');
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e=>{
    if (!dragging) return;
    const dx = e.clientX - lx, dy = e.clientY - ly;
    if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
    ox += dx; oy += dy; lx = e.clientX; ly = e.clientY;
    clampPan(); draw();
  });
  canvas.addEventListener('pointerup', e=>{
    if (e.pointerType === 'touch') return;
    canvas.classList.remove('dragging');
    dragging = false;
  });

  // ── 觸控：單指平移／點擊，雙指縮放 ──
  const touches = new Map();
  let pinchDist = 0, touchMoved = false;
  canvas.addEventListener('touchstart', e=>{
    e.preventDefault(); touchMoved = false;
    for (const t of e.changedTouches) touches.set(t.identifier, {x:t.clientX, y:t.clientY});
    if (touches.size === 2){
      const a = [...touches.values()];
      pinchDist = Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y);
    }
  }, {passive:false});
  canvas.addEventListener('touchmove', e=>{
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    if (touches.size === 1 && e.touches.length === 1){
      const t = e.touches[0], p = touches.get(t.identifier);
      if (p){
        const dx = t.clientX - p.x, dy = t.clientY - p.y;
        if (Math.abs(dx) + Math.abs(dy) > 4) touchMoved = true;
        ox += dx; oy += dy;
        touches.set(t.identifier, {x:t.clientX, y:t.clientY});
        clampPan(); draw();
      }
    } else if (e.touches.length === 2){
      touchMoved = true;
      const t0 = e.touches[0], t1 = e.touches[1];
      const d = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
      const cx = (t0.clientX + t1.clientX)/2 - r.left;
      const cy = (t0.clientY + t1.clientY)/2 - r.top;
      if (pinchDist > 0) zoomAt(cx, cy, d / pinchDist);
      pinchDist = d;
      touches.clear();
      for (const t of e.touches) touches.set(t.identifier, {x:t.clientX, y:t.clientY});
    }
  }, {passive:false});
  canvas.addEventListener('touchend', e=>{
    e.preventDefault();
    for (const t of e.changedTouches) touches.delete(t.identifier);
    if (touches.size < 2) pinchDist = 0;
  }, {passive:false});


  // ── 載入照片 ──
  const marsImg = document.getElementById('marsSrc');
  document.getElementById('fileInput').addEventListener('change', e=>{
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const url = URL.createObjectURL(f);
    const im = new Image();
    im.onload = ()=>{ loadImage(im, '這是你的照片！試著放大，找出它的像素格。'); URL.revokeObjectURL(url); };
    im.src = url;
  });
  document.getElementById('btnMars').addEventListener('click', ()=>{
    loadImage(marsImg, '回到範例風景照片，再放大一次看看！');
  });

  window.addEventListener('resize', ()=>{ resetView(); });

  if (marsImg.complete) loadImage(marsImg);
  else marsImg.onload = ()=> loadImage(marsImg);
})();
</script>

</body>
</html>
